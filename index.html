<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的音樂播放器 | My Music Station</title>
    <style>
      :root {
        --bg-color: #0f0f0f;
        --card-bg: #1e1e1e;
        --accent-color: #ff0000;
        --text-main: #ffffff;
        --text-dim: #aaaaaa;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        width: 90%;
        max-width: 800px;
        padding: 40px 20px;
      }

      h1 {
        font-weight: 300;
        letter-spacing: 2px;
        margin-bottom: 30px;
      }

      /* 播放器容器：隱藏但保持運作 */
      #player-wrapper {
        background: #000;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        /* 如果你想完全像背景音樂，可以取消註解下面這行 */
        /* display: none; */
      }

      /* 歌單樣式 */
      .playlist {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 10px;
        list-style: none;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }

      .song-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        margin: 5px 0;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        border-left: 4px solid transparent;
      }

      .song-item:hover {
        background: #2a2a2a;
        transform: translateX(5px);
      }

      .song-item.active {
        background: #2a2a2a;
        border-left-color: var(--accent-color);
      }

      .song-info .title {
        display: block;
        font-size: 1.1em;
      }
      .song-info .status {
        font-size: 0.8em;
        color: var(--text-dim);
      }

      .controls-hint {
        margin-top: 20px;
        color: var(--text-dim);
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Music Station</h1>

      <div id="player-wrapper">
        <div id="player"></div>
      </div>

      <ul class="playlist" id="playlist"></ul>

      <div class="controls-hint">
        提示：點擊歌曲即可切換。支援自動播放下一首。
      </div>
    </div>

    <script>
      // 1. 你的歌單資料
      const songs = [
        { title: "響念 Missing", videoId: "B5bQ355FA2o", start: 299, end: 507 },
        { title: "Moon River", videoId: "B5bQ355FA2o", start: 3338, end: 3550 },
        {
          title: "送給你的",
          videoId: "B5bQ355FA2o",
          start: 6938,
          end: 7236,
        },
      ];

      let player;
      let currentSongIndex = 0;
      let progressTimer; // 用來存放計時器

      function startProgessTimer() {
        // 每次切換歌曲前先清除舊的計時器，避免重複執行
        if (progressTimer) clearInterval(progressTimer);

        progressTimer = setInterval(() => {
          if (player && player.getCurrentTime) {
            const currentTime = player.getCurrentTime();
            const currentSong = songs[currentSongIndex];

            // 檢查是否設定了結束時間，且目前時間是否已超過結束時間
            if (currentSong.end && currentTime >= currentSong.end) {
              console.log("偵測到歌曲結束，準備跳轉下一首...");
              playNext();
            }
          }
        }, 1000); // 每 1000 毫秒 (1秒) 檢查一次
      }
      // 2. 初始化 YouTube API
      function onYouTubeIframeAPIReady() {
        player = new YT.Player("player", {
          height: "360",
          width: "100%", // 適應手機寬度
          videoId: songs[0].videoId,
          playerVars: {
            autoplay: 1, // 自動播放
            controls: 1, // 顯示控制列（這有助於手動跳過廣告）
            rel: 0, // 不顯示相關影片
            enablejsapi: 1,
            origin: location.origin,
          },
          events: {
            onReady: onPlayerReady,
            onStateChange: onPlayerStateChange,
            onError: onPlayerError,
          },
        });
      }

      function onPlayerReady() {
        renderPlaylist();
      }

      // 3. 核心功能：自動播放下一首
      function onPlayerStateChange(event) {
        // 當影片結束 (YT.PlayerState.ENDED = 0)
        if (event.data === 0) {
          playNext();
        }
      }

      function playNext() {
        currentSongIndex++;
        if (currentSongIndex < songs.length) {
          playSong(currentSongIndex);
        } else {
          console.log("歌單已播放完畢");
        }
      }

      // 4. 播放指定歌曲
      function playSong(index) {
        const song = songs[index];
        currentSongIndex = index;

        // 取得目前播放器內的影片 ID
        const currentVideoId = player.getVideoData()
          ? player.getVideoData().video_id
          : null;

        if (song.videoId === currentVideoId) {
          // [關鍵] 同一個直播檔：直接跳轉秒數，不重新載入
          console.log("同影片跳轉中...");
          player.seekTo(song.start, true);
          player.playVideo();
        } else {
          // 不同影片：才需要重新載入
          console.log("切換新影片中...");
          player.loadVideoById({
            videoId: song.videoId,
            startSeconds: song.start,
          });
        }
        player.loadVideoById({
          videoId: songs[index].videoId,
          startSeconds: songs[index].start,
        });

        currentSongIndex = index;
        updateUI();

        // [重點] 啟動偵測邏輯
        startProgessTimer();
      }

      // 修正 playNext 避免超出歌單範圍
      function playNext() {
        if (currentSongIndex < songs.length - 1) {
          playSong(currentSongIndex + 1);
        } else {
          console.log("已到歌單末尾");
          clearInterval(progressTimer); // 停止偵測
        }
        updateUI();
      }
      // 5. 渲染與更新 UI
      function renderPlaylist() {
        const listElement = document.getElementById("playlist");
        listElement.innerHTML = "";

        songs.forEach((song, index) => {
          const li = document.createElement("li");
          li.className = `song-item ${index === currentSongIndex ? "active" : ""}`;
          li.innerHTML = `
                    <div class="song-info">
                        <span class="title">${song.title}</span>
                        <span class="status">${index === currentSongIndex ? "正在播放" : "待播放"}</span>
                    </div>
                `;
          li.onclick = () => playSong(index);
          listElement.appendChild(li);
        });
      }

      function updateUI() {
        const items = document.querySelectorAll(".song-item");
        items.forEach((item, index) => {
          item.className = `song-item ${index === currentSongIndex ? "active" : ""}`;
          item.querySelector(".status").innerText =
            index === currentSongIndex ? "正在播放" : "待播放";
        });
      }

      function onPlayerError(e) {
        console.error("播放發生錯誤，代碼：" + e.data);
        if (e.data == 101 || e.data == 150) {
          alert("抱歉，此影片因版權或嵌入限制無法播放。");
        }
      }
    </script>

    <script src="https://www.youtube.com/iframe_api"></script>
  </body>
</html>
