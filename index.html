<script>
  // 1. 先宣告變數
  var player;
  var currentSongIndex = 0;
  var hasStarted = false;
  const songs = [
    { title: "響念 Missing", videoId: "B5bQ355FA2o", start: 299, end: 507 },
    { title: "Moon River", videoId: "B5bQ355FA2o", start: 3338, end: 3550 },
    { title: "送給你的", videoId: "B5bQ355FA2o", start: 6938, end: 7236 },
  ];

  // 2. 將函式直接掛載到 window，確保 API 絕對找得到
  window.onYouTubeIframeAPIReady = function () {
    console.log("API 準備中...");
    player = new YT.Player("player", {
      height: "360",
      width: "100%",
      playerVars: {
        autoplay: 0,
        controls: 1,
        enablejsapi: 1,
        origin: window.location.origin,
      },
      events: {
        onReady: window.onPlayerReady,
        onStateChange: window.onPlayerStateChange,
      },
    });
  };

  window.onPlayerReady = function () {
    console.log("播放器就緒");
    renderPlaylist();
    prepareSong(0);
  };

  window.onPlayerStateChange = function (event) {
    console.log("狀態改變:", event.data);
    if (event.data === YT.PlayerState.PLAYING) {
      if (!hasStarted) {
        hasStarted = true;
        renderPlaylist();
      }
    }
    if (event.data === YT.PlayerState.ENDED && hasStarted) {
      playNext();
    }
  };

  // --- 以下為輔助邏輯 ---

  function renderPlaylist() {
    const listElement = document.getElementById("playlist");
    if (!listElement) return;
    listElement.innerHTML = "";
    songs.forEach((song, index) => {
      const li = document.createElement("li");
      li.className = `song-item ${index === currentSongIndex ? "active" : ""}`;
      li.innerHTML = `
                <span>${song.title}</span>
                <span class="status-tag">${index === currentSongIndex ? (hasStarted ? "播放中" : "已選取") : ""}</span>
            `;
      li.onclick = () => handleSongClick(index);
      listElement.appendChild(li);
    });
  }

  function handleSongClick(index) {
    currentSongIndex = index;
    const song = songs[index];
    if (!hasStarted) {
      player.cueVideoById({ videoId: song.videoId, startSeconds: song.start });
    } else {
      player.loadVideoById({ videoId: song.videoId, startSeconds: song.start });
    }
    renderPlaylist();
  }

  function prepareSong(index) {
    player.cueVideoById({
      videoId: songs[index].videoId,
      startSeconds: songs[index].start,
    });
  }

  function playNext() {
    if (currentSongIndex < songs.length - 1) {
      currentSongIndex++;
      player.loadVideoById({
        videoId: songs[currentSongIndex].videoId,
        startSeconds: songs[currentSongIndex].start,
      });
      renderPlaylist();
    }
  }
</script>

<script src="https://www.youtube.com/iframe_api"></script>
