<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Station | 修正穩定版</title>
    <style>
      :root {
        --bg-color: #0f0f0f;
        --card-bg: #1e1e1e;
        --accent-color: #ff0000;
        --text-main: #ffffff;
        --text-dim: #aaaaaa;
      }
      body {
        font-family: sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }
      .container {
        width: 90%;
        max-width: 800px;
        padding: 40px 20px;
      }
      #player-wrapper {
        background: #000;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        min-height: 360px;
        width: 100%;
      }
      .playlist {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 10px;
        list-style: none;
      }
      .song-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        margin: 5px 0;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
        border-left: 4px solid transparent;
      }
      .song-item:hover {
        background: #2a2a2a;
      }
      .song-item.active {
        background: #2a2a2a;
        border-left-color: var(--accent-color);
      }
      .status {
        font-size: 0.8em;
        color: var(--text-dim);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Music Station</h1>
      <div id="player-wrapper">
        <div id="player"></div>
      </div>
      <ul class="playlist" id="playlist"></ul>
    </div>

    <script>
      // 1. 全域變數定義
      window.songs = [
        { title: "響念 Missing", videoId: "B5bQ355FA2o", start: 299 },
        { title: "Moon River", videoId: "B5bQ355FA2o", start: 3338 },
        { title: "送給你的", videoId: "B5bQ355FA2o", start: 6938 },
      ];
      window.player = null;
      window.currentSongIndex = 0;

      // 2. 【核心修正】: 直接定義全域函式，確保 API 呼叫時它們一定存在
      window.onYouTubeIframeAPIReady = function () {
        console.log("YouTube API 載入成功");
        window.player = new YT.Player("player", {
          height: "360",
          width: "100%",
          playerVars: {
            autoplay: 0,
            controls: 1,
            rel: 0, //
            modestbranding: 1, //
            iv_load_policy: 3, //
            enablejsapi: 1,
            origin: window.location.origin,
          },
          events: {
            onReady: window.onPlayerReady,
            onStateChange: window.onPlayerStateChange,
          },
        });
      };

      window.onPlayerReady = function () {
        console.log("播放器就緒");
        window.renderPlaylist();
        window.player.cueVideoById({
          videoId: window.songs[0].videoId,
          startSeconds: window.songs[0].start,
        });
      };

      window.onPlayerStateChange = function (event) {
        if (event.data === YT.PlayerState.ENDED) {
          window.playNext();
        }
        // 廣告校準邏輯
        if (event.data === YT.PlayerState.PLAYING) {
          const song = window.songs[window.currentSongIndex];
          if (Math.abs(window.player.getCurrentTime() - song.start) > 5) {
            window.player.seekTo(song.start, true);
          }
        }
      };

      window.renderPlaylist = function () {
        const list = document.getElementById("playlist");
        if (!list) return;
        list.innerHTML = "";
        window.songs.forEach((song, index) => {
          const li = document.createElement("li");
          li.className = `song-item ${index === window.currentSongIndex ? "active" : ""}`;
          li.innerHTML = `<div><span class="title">${song.title}</span></div><span class="status">${index === window.currentSongIndex ? "正在播放" : "待播放"}</span>`;
          li.onclick = () => window.playSong(index);
          list.appendChild(li);
        });
      };

      window.playSong = function (index) {
        window.currentSongIndex = index;
        const song = window.songs[index];
        const currentId = window.player.getVideoData()
          ? window.player.getVideoData().video_id
          : null;

        if (song.videoId === currentId) {
          // 同影片跳轉優化
          window.player.seekTo(song.start, true);
          window.player.playVideo();
        } else {
          window.player.loadVideoById({
            videoId: song.videoId,
            startSeconds: song.start,
          });
        }
        window.renderPlaylist();
      };

      window.playNext = function () {
        if (window.currentSongIndex < window.songs.length - 1) {
          window.playSong(window.currentSongIndex + 1);
        }
      };
    </script>

    <script src="https://www.youtube-nocookie.com/iframe_api"></script>
  </body>
</html>
