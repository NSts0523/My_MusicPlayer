<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Music Player</title>
    <style>
      body {
        font-family: sans-serif;
        background: #121212;
        color: white;
        padding: 20px;
        text-align: center;
      }
      #player-container {
        margin-bottom: 20px;
        background: #000;
        width: 100%;
        max-width: 640px;
        display: inline-block;
        min-height: 360px;
      }
      .playlist {
        list-style: none;
        padding: 0;
        max-width: 600px;
        margin: 0 auto;
        text-align: left;
      }
      .song-item {
        cursor: pointer;
        padding: 12px;
        border-bottom: 1px solid #333;
        transition: 0.3s;
        display: flex;
        justify-content: space-between;
      }
      .song-item:hover {
        background: #222;
        color: #ff0000;
      }
      .song-item.active {
        background: #1a1a1a;
        border-left: 4px solid #ff0000;
        color: #ff0000;
      }
      .status-tag {
        font-size: 0.8em;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <h2>直播存檔播放器</h2>

    <div id="player-container">
      <div id="player"></div>
    </div>

    <ul class="playlist" id="playlist"></ul>

    <script>
      // 設定區
      var songs = [
        { title: "響念 Missing", videoId: "B5bQ355FA2o", start: 299, end: 507 },
        { title: "Moon River", videoId: "B5bQ355FA2o", start: 3338, end: 3550 },
        { title: "送給你的", videoId: "B5bQ355FA2o", start: 6938, end: 7236 },
      ];

      var player;
      var currentSongIndex = 0;
      var hasStarted = false;

      // 【核心渲染函式】
      window.renderPlaylist = function () {
        var listElement = document.getElementById("playlist");
        if (!listElement) return;

        listElement.innerHTML = "";
        songs.forEach(function (song, index) {
          var li = document.createElement("li");
          li.className =
            "song-item" + (index === currentSongIndex ? " active" : "");

          var statusText = "";
          if (index === currentSongIndex) {
            statusText = hasStarted ? "播放中" : "已選取";
          }

          li.innerHTML =
            "<span>" +
            song.title +
            "</span><span class='status-tag'>" +
            statusText +
            "</span>";
          li.onclick = function () {
            window.handleSongClick(index);
          };
          listElement.appendChild(li);
        });
      };

      // 【處理點擊播放】
      window.handleSongClick = function (index) {
        var song = songs[index];
        var previousIndex = currentSongIndex;
        currentSongIndex = index;
        hasStarted = true;

        // 取得目前播放器正在播的影片 ID (如果有的話)
        var currentVideoId = "";
        if (player && player.getVideoData) {
          currentVideoId = player.getVideoData().video_id;
        }

        if (song.videoId === currentVideoId) {
          // 【核心避開廣告邏輯】
          // 如果是同一個直播檔，直接跳轉秒數，不重新載入播放器
          console.log("同影片跳轉，避開重新載入廣告...");
          player.seekTo(song.start, true);
          player.playVideo(); // 確保它是播放狀態
        } else {
          // 如果是不同的影片，才執行 loadVideoById
          console.log("切換新影片...");
          player.loadVideoById({
            videoId: song.videoId,
            startSeconds: song.start,
          });
        }

        window.renderPlaylist();
      };

      // 【自動下一首】
      window.playNext = function () {
        if (currentSongIndex < songs.length - 1) {
          currentSongIndex++;
          window.handleSongClick(currentSongIndex);
        }
      };

      // 【YouTube API 事件】
      window.onYouTubeIframeAPIReady = function () {
        console.log("API Ready");
        player = new YT.Player("player", {
          height: "360",
          width: "100%",
          playerVars: {
            autoplay: 0,
            controls: 1,
            enablejsapi: 1,
            origin: window.location.origin,
          },
          events: {
            onReady: window.onPlayerReady,
            onStateChange: window.onPlayerStateChange,
          },
        });
      };

      window.onPlayerReady = function () {
        console.log("Player Ready");
        window.renderPlaylist();
        // 預先加載第一首，但不播放
        player.cueVideoById({
          videoId: songs[0].videoId,
          startSeconds: songs[0].start,
        });
      };

      window.onPlayerStateChange = function (event) {
        if (event.data === YT.PlayerState.PLAYING) {
          var song = songs[currentSongIndex];
          // 如果播放中發現時間不對 (誤差超過 3 秒)，強制拉回 start 位置
          // 這能解決「廣告播完後影片回到 0:00」的問題
          if (Math.abs(player.getCurrentTime() - song.start) > 5) {
            player.seekTo(song.start, true);
          }

          if (!hasStarted) {
            hasStarted = true;
            window.renderPlaylist();
          }
          if (!hasStarted) {
            hasStarted = true;
            window.renderPlaylist();
          }
        }
        if (event.data === YT.PlayerState.ENDED && hasStarted) {
          window.playNext();
        }
      };
    </script>

    <script src="https://www.youtube.com/iframe_api"></script>
  </body>
</html>
