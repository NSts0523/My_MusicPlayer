<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Station | 修正版</title>
    <style>
      :root {
        --bg-color: #0f0f0f;
        --card-bg: #1e1e1e;
        --accent-color: #ff0000;
        --text-main: #ffffff;
        --text-dim: #aaaaaa;
      }
      body {
        font-family: sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }
      .container {
        width: 95%;
        max-width: 800px;
      }
      .video-container {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%;
        background: #000;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 30px;
      }
      #player {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
      }
      .playlist {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 10px;
        list-style: none;
        margin: 0;
      }
      .song-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        margin: 5px 0;
        border-radius: 8px;
        cursor: pointer;
        border-left: 4px solid transparent;
      }
      .song-item.active {
        background: #2a2a2a;
        border-left-color: var(--accent-color);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Music Station</h1>
      <div class="video-container">
        <div id="player"></div>
      </div>
      <ul class="playlist" id="playlist"></ul>
    </div>

    <script>
      window.songs = [
        { title: "響念 Missing", videoId: "B5bQ355FA2o", start: 299 },
        { title: "Moon River", videoId: "B5bQ355FA2o", start: 3338 },
        { title: "送給你的", videoId: "B5bQ355FA2o", start: 6938 },
      ];
      window.player = null;
      window.currentSongIndex = 0;
      let isInitialLoad = true;

      // API 準備好後的初始化
      window.onYouTubeIframeAPIReady = function () {
        window.player = new YT.Player("player", {
          height: "100%",
          width: "100%",
          videoId: window.songs[0].videoId,
          host: "https://www.youtube-nocookie.com", // 減少追蹤與部分廣告
          playerVars: {
            autoplay: 0,
            controls: 1,
            modestbranding: 1,
            rel: 0,
            iv_load_policy: 3,
            start: window.songs[0].start,
          },
          events: {
            onReady: window.onPlayerReady,
            onStateChange: window.onPlayerStateChange,
          },
        });
      };

      window.onPlayerReady = function () {
        window.renderPlaylist();
      };

      window.onPlayerStateChange = function (event) {
        // 影片結束自動下一首
        if (event.data === YT.PlayerState.ENDED) {
          window.playNext();
        }

        // 修正廣告後的定位問題
        if (event.data === YT.PlayerState.PLAYING && isInitialLoad) {
          const song = window.songs[window.currentSongIndex];
          window.player.seekTo(song.start, true);
          isInitialLoad = false; // 確保只在切換歌曲後第一次播放時校準
        }
      };

      window.playSong = function (index) {
        window.currentSongIndex = index;
        const song = window.songs[index];
        isInitialLoad = true; // 標記為需要重新定位

        // 判斷是否為同影片
        const videoData = window.player.getVideoData();
        const currentId = videoData ? videoData.video_id : null;

        if (song.videoId === currentId) {
          window.player.seekTo(song.start, true);
          window.player.playVideo();
        } else {
          window.player.loadVideoById({
            videoId: song.videoId,
            startSeconds: song.start,
          });
        }
        window.renderPlaylist();
      };

      window.renderPlaylist = function () {
        const list = document.getElementById("playlist");
        list.innerHTML = "";
        window.songs.forEach((song, index) => {
          const li = document.createElement("li");
          li.className = `song-item ${index === window.currentSongIndex ? "active" : ""}`;
          li.innerHTML = `<span>${song.title}</span>`;
          li.onclick = () => window.playSong(index);
          list.appendChild(li);
        });
      };

      window.playNext = function () {
        if (window.currentSongIndex < window.songs.length - 1) {
          window.playSong(window.currentSongIndex + 1);
        }
      };
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
  </body>
</html>
