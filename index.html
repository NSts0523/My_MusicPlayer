<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Music Player</title>
    <style>
      body {
        font-family: sans-serif;
        background: #121212;
        color: white;
        padding: 20px;
        text-align: center;
      }
      #player-container {
        margin-bottom: 20px;
        background: #000;
        width: 100%;
        max-width: 640px;
        display: inline-block;
        min-height: 360px;
      }
      .playlist {
        list-style: none;
        padding: 0;
        max-width: 600px;
        margin: 0 auto;
        text-align: left;
      }
      .song-item {
        cursor: pointer;
        padding: 12px;
        border-bottom: 1px solid #333;
        transition: 0.3s;
        display: flex;
        justify-content: space-between;
      }
      .song-item:hover {
        background: #222;
        color: #ff0000;
      }
      .song-item.active {
        background: #1a1a1a;
        border-left: 4px solid #ff0000;
        color: #ff0000;
      }
      .status-tag {
        font-size: 0.8em;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <h2>直播存檔播放器</h2>

    <div id="player-container">
      <div id="player"></div>
    </div>

    <ul class="playlist" id="playlist"></ul>

    <script>
      // 設定區
      var songs = [
        { title: "響念 Missing", videoId: "B5bQ355FA2o", start: 299, end: 507 },
        { title: "Moon River", videoId: "B5bQ355FA2o", start: 3338, end: 3550 },
        { title: "送給你的", videoId: "B5bQ355FA2o", start: 6938, end: 7236 },
      ];

      var player;
      var currentSongIndex = 0;
      var hasStarted = false;

      // 【核心渲染函式】
      window.renderPlaylist = function () {
        var listElement = document.getElementById("playlist");
        if (!listElement) return;

        listElement.innerHTML = "";
        songs.forEach(function (song, index) {
          var li = document.createElement("li");
          li.className =
            "song-item" + (index === currentSongIndex ? " active" : "");

          var statusText = "";
          if (index === currentSongIndex) {
            statusText = hasStarted ? "播放中" : "已選取";
          }

          li.innerHTML =
            "<span>" +
            song.title +
            "</span><span class='status-tag'>" +
            statusText +
            "</span>";
          li.onclick = function () {
            window.handleSongClick(index);
          };
          listElement.appendChild(li);
        });
      };

      // 【處理點擊播放】
      window.handleSongClick = function (index) {
        var song = songs[index];
        var oldVideoId =
          player && player.getVideoData ? player.getVideoData().video_id : "";
        currentSongIndex = index;
        hasStarted = true;

        if (song.videoId === oldVideoId) {
          // --- 策略 A：同影片 0 廣告跳轉 ---
          // 使用 seekTo(time, true)，true 代表允許請求伺服器跳轉，這幾乎不觸發廣告
          player.seekTo(song.start, true);
          player.playVideo();
        } else {
          // --- 策略 B：換片時的「強制校準」 ---
          // 換片必有廣告風險，我們用「靜音校準」大法
          player.mute(); // 先靜音，避免廣告大聲公
          player.loadVideoById({
            videoId: song.videoId,
            startSeconds: song.start,
          });

          // 設一個定時器，每 500ms 檢查一次，直到廣告結束或跳轉成功
          var forceCorrection = setInterval(function () {
            if (player.getPlayerState() === YT.PlayerState.PLAYING) {
              var now = player.getCurrentTime();
              if (Math.abs(now - song.start) > 3) {
                player.seekTo(song.start, true);
              } else {
                player.unMute(); // 跳轉精準後才放聲音
                clearInterval(forceCorrection);
              }
            }
          }, 500);
          setTimeout(function () {
            clearInterval(forceCorrection);
          }, 8000); // 8秒後放棄強制校準
        }
        window.renderPlaylist();
      };

      // 【自動下一首】
      window.playNext = function () {
        if (currentSongIndex < songs.length - 1) {
          currentSongIndex++;
          window.handleSongClick(currentSongIndex);
        }
      };

      // 【YouTube API 事件】
      window.onYouTubeIframeAPIReady = function () {
        console.log("API Ready");
        player = new YT.Player("player", {
          height: "360",
          width: "100%",
          playerVars: {
            widget_referrer: window.location.href, // 告訴 YouTube 這是正式的引用
            iv_load_policy: 3, // 隱藏影片註解（有時註解會觸發廣告廣告廣告點）
            autoplay: 0,
            controls: 1,
            enablejsapi: 1,
            origin: window.location.origin,
          },
          events: {
            onReady: window.onPlayerReady,
            onStateChange: window.onPlayerStateChange,
          },
        });
      };

      window.onPlayerReady = function () {
        console.log("Player Ready");
        window.renderPlaylist();
        // 預先加載第一首，但不播放
        player.cueVideoById({
          videoId: songs[0].videoId,
          startSeconds: songs[0].start,
        });
      };

      window.onPlayerStateChange = function (event) {
        if (event.data === YT.PlayerState.PLAYING) {
          var song = songs[currentSongIndex];
          // 如果播放中發現時間不對 (誤差超過 3 秒)，強制拉回 start 位置
          // 這能解決「廣告播完後影片回到 0:00」的問題
          if (Math.abs(player.getCurrentTime() - song.start) > 5) {
            player.seekTo(song.start, true);
          }

          if (!hasStarted) {
            hasStarted = true;
            window.renderPlaylist();
          }
          if (!hasStarted) {
            hasStarted = true;
            window.renderPlaylist();
          }
        }
        if (event.data === YT.PlayerState.ENDED && hasStarted) {
          window.playNext();
        }
      };
    </script>

    <script src="https://www.youtube.com/iframe_api"></script>
  </body>
</html>
