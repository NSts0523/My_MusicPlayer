<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的音樂播放器 | My Music Station</title>
    <style>
      :root {
        --bg-color: #0f0f0f;
        --card-bg: #1e1e1e;
        --accent-color: #ff0000;
        --text-main: #ffffff;
        --text-dim: #aaaaaa;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        width: 90%;
        max-width: 800px;
        padding: 40px 20px;
      }

      h1 {
        font-weight: 300;
        letter-spacing: 2px;
        margin-bottom: 30px;
      }

      /* 播放器容器：隱藏但保持運作 */
      #player-wrapper {
        background: #000;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        /* 如果你想完全像背景音樂，可以取消註解下面這行 */
        /* display: none; */
      }

      /* 歌單樣式 */
      .playlist {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 10px;
        list-style: none;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }

      .song-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        margin: 5px 0;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        border-left: 4px solid transparent;
      }

      .song-item:hover {
        background: #2a2a2a;
        transform: translateX(5px);
      }

      .song-item.active {
        background: #2a2a2a;
        border-left-color: var(--accent-color);
      }

      .song-info .title {
        display: block;
        font-size: 1.1em;
      }
      .song-info .status {
        font-size: 0.8em;
        color: var(--text-dim);
      }

      .controls-hint {
        margin-top: 20px;
        color: var(--text-dim);
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Music Station</h1>

      <div id="player-wrapper">
        <div id="player"></div>
      </div>

      <ul class="playlist" id="playlist"></ul>

      <div class="controls-hint">
        提示：點擊歌曲即可切換。支援自動播放下一首。
      </div>
    </div>

    <script>
      // 1. 你的歌單資料
      const songs = [
        { title: "響念 Missing", videoId: "B5bQ355FA2o", start: 299, end: 507 },
        { title: "Moon River", videoId: "B5bQ355FA2o", start: 3338, end: 3550 },
        {
          title: "送給你的",
          videoId: "B5bQ355FA2o",
          start: 6938,
          end: 7236,
        },
      ];

      let player;
      let currentSongIndex = 0;

      // 2. 初始化 YouTube API
      function onYouTubeIframeAPIReady() {
        player = new YT.Player("player", {
          height: "360",
          width: "100%", // 適應手機寬度
          videoId: songs[0].videoId,
          playerVars: {
            autoplay: 1, // 自動播放
            controls: 1, // 顯示控制列（這有助於手動跳過廣告）
            rel: 0, // 不顯示相關影片
            enablejsapi: 1,
            origin: location.origin,
          },
          events: {
            onReady: onPlayerReady,
            onStateChange: onPlayerStateChange,
            onError: onPlayerError,
          },
        });
      }

      function onPlayerReady() {
        renderPlaylist();
      }

      // 3. 核心功能：自動播放下一首
      function onPlayerStateChange(event) {
        // 當影片結束 (YT.PlayerState.ENDED = 0)
        if (event.data === 0) {
          playNext();
        }
      }

      function playNext() {
        currentSongIndex++;
        if (currentSongIndex < songs.length) {
          playSong(currentSongIndex);
        } else {
          console.log("歌單已播放完畢");
        }
      }

      // 4. 播放指定歌曲
      function playSong(index) {
        const song = songs[index];
        currentSongIndex = index;

        console.log(`準備播放：${song.title}，目標秒數：${song.start}`);

        // 1. 強制執行載入
        player.loadVideoById({
          videoId: song.videoId,
          startSeconds: song.start,
        });

        // 2. [保險機制] 監控播放狀態，防止跳轉失效
        // 有些廣告會洗掉 startSeconds，我們在影片真正開始播 (State 1) 時再校對一次
        const checkJump = setInterval(() => {
          const state = player.getPlayerState();
          const currentTime = player.getCurrentTime();

          // 如果影片開始播了，但時間點跟目標差太多 (超過 5 秒誤差)
          if (state === 1 && Math.abs(currentTime - song.start) > 5) {
            console.log("偵測到跳轉失效，執行二次強制跳轉...");
            player.seekTo(song.start, true);
            clearInterval(checkJump); // 校對完成，清除計時器
          }

          // 如果播了 10 秒還沒校對成功，也清除計時器避免無限循環
        }, 500);

        setTimeout(() => clearInterval(checkJump), 10000);

        updateUI();
        startProgessTimer(); // 啟動你之前寫的自動結束偵測
      }
      // 5. 渲染與更新 UI
      function renderPlaylist() {
        const listElement = document.getElementById("playlist");
        listElement.innerHTML = "";

        songs.forEach((song, index) => {
          const li = document.createElement("li");
          li.className = `song-item ${index === currentSongIndex ? "active" : ""}`;
          li.innerHTML = `
                    <div class="song-info">
                        <span class="title">${song.title}</span>
                        <span class="status">${index === currentSongIndex ? "正在播放" : "待播放"}</span>
                    </div>
                `;
          li.onclick = () => playSong(index);
          listElement.appendChild(li);
        });
      }

      function updateUI() {
        const items = document.querySelectorAll(".song-item");
        items.forEach((item, index) => {
          item.className = `song-item ${index === currentSongIndex ? "active" : ""}`;
          item.querySelector(".status").innerText =
            index === currentSongIndex ? "正在播放" : "待播放";
        });
      }

      function onPlayerError(e) {
        console.error("播放發生錯誤，代碼：" + e.data);
        if (e.data == 101 || e.data == 150) {
          alert("抱歉，此影片因版權或嵌入限制無法播放。");
        }
      }
    </script>

    <script src="https://www.youtube.com/iframe_api"></script>
  </body>
</html>
