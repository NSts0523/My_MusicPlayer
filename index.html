<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的音樂播放器 | My Music Station</title>
    <style>
      :root {
        --bg-color: #0f0f0f;
        --card-bg: #1e1e1e;
        --accent-color: #ff0000;
        --text-main: #ffffff;
        --text-dim: #aaaaaa;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        width: 90%;
        max-width: 800px;
        padding: 40px 20px;
      }

      h1 {
        font-weight: 300;
        letter-spacing: 2px;
        margin-bottom: 30px;
      }

      /* 播放器容器：隱藏但保持運作 */
      #player-wrapper {
        background: #000;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        /* 如果你想完全像背景音樂，可以取消註解下面這行 */
        /* display: none; */
      }

      /* 歌單樣式 */
      .playlist {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 10px;
        list-style: none;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }

      .song-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        margin: 5px 0;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        border-left: 4px solid transparent;
      }

      .song-item:hover {
        background: #2a2a2a;
        transform: translateX(5px);
      }

      .song-item.active {
        background: #2a2a2a;
        border-left-color: var(--accent-color);
      }

      .song-info .title {
        display: block;
        font-size: 1.1em;
      }
      .song-info .status {
        font-size: 0.8em;
        color: var(--text-dim);
      }

      .controls-hint {
        margin-top: 20px;
        color: var(--text-dim);
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Music Station</h1>

      <div id="player-wrapper">
        <div id="player"></div>
      </div>

      <ul class="playlist" id="playlist"></ul>

      <div class="controls-hint">
        提示：點擊歌曲即可切換。支援自動播放下一首。
      </div>
    </div>
    <script>
      // 1. 先宣告變數
      var player;
      var currentSongIndex = 0;
      var hasStarted = false;
      const songs = [
        { title: "響念 Missing", videoId: "B5bQ355FA2o", start: 299, end: 507 },
        { title: "Moon River", videoId: "B5bQ355FA2o", start: 3338, end: 3550 },
        { title: "送給你的", videoId: "B5bQ355FA2o", start: 6938, end: 7236 },
      ];

      // 2. 將函式直接掛載到 window，確保 API 絕對找得到
      window.onYouTubeIframeAPIReady = function () {
        console.log("API 準備中...");
        player = new YT.Player("player", {
          height: "360",
          width: "100%",
          playerVars: {
            autoplay: 0,
            controls: 1,
            enablejsapi: 1,
            origin: window.location.origin,
          },
          events: {
            onReady: window.onPlayerReady,
            onStateChange: window.onPlayerStateChange,
          },
        });
      };

      window.onPlayerReady = function () {
        console.log("播放器就緒");
        renderPlaylist();
        prepareSong(0);
      };

      // ... 前方的初始化程式碼保持不變 ...

      window.onPlayerStateChange = function (event) {
        // 當影片真正開始播放時
        if (event.data === YT.PlayerState.PLAYING) {
          hasStarted = true;
          renderPlaylist();
        }

        // 當影片結束且處於聽歌模式時，自動下一首
        if (event.data === YT.PlayerState.ENDED && hasStarted) {
          playNext();
        }
      };

      function handleSongClick(index) {
        currentSongIndex = index;
        const song = songs[index];

        // 關鍵：直接 load，不要 cue
        hasStarted = true;
        player.loadVideoById({
          videoId: song.videoId,
          startSeconds: song.start,
        });

        renderPlaylist();
      }

      function playNext() {
        if (currentSongIndex < songs.length - 1) {
          currentSongIndex++;
          const nextSong = songs[currentSongIndex];

          // 自動下一首也要直接 load
          player.loadVideoById({
            videoId: nextSong.videoId,
            startSeconds: nextSong.start,
          });
          renderPlaylist();
        } else {
          console.log("歌單已播完");
        }
      }
    </script>

    <script src="https://www.youtube.com/iframe_api"></script>
  </body>
</html>
