<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的音樂播放器 | My Music Station</title>
    <style>
      :root {
        --bg-color: #0f0f0f;
        --card-bg: #1e1e1e;
        --accent-color: #ff0000;
        --text-main: #ffffff;
        --text-dim: #aaaaaa;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        width: 90%;
        max-width: 800px;
        padding: 40px 20px;
      }

      h1 {
        font-weight: 300;
        letter-spacing: 2px;
        margin-bottom: 30px;
      }

      /* 播放器容器：隱藏但保持運作 */
      #player-wrapper {
        background: #000;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        /* 如果你想完全像背景音樂，可以取消註解下面這行 */
        /* display: none; */
      }

      /* 歌單樣式 */
      .playlist {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 10px;
        list-style: none;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }

      .song-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        margin: 5px 0;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        border-left: 4px solid transparent;
      }

      .song-item:hover {
        background: #2a2a2a;
        transform: translateX(5px);
      }

      .song-item.active {
        background: #2a2a2a;
        border-left-color: var(--accent-color);
      }

      .song-info .title {
        display: block;
        font-size: 1.1em;
      }
      .song-info .status {
        font-size: 0.8em;
        color: var(--text-dim);
      }

      .controls-hint {
        margin-top: 20px;
        color: var(--text-dim);
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Music Station</h1>

      <div id="player-wrapper">
        <div id="player"></div>
      </div>

      <ul class="playlist" id="playlist"></ul>

      <div class="controls-hint">
        提示：點擊歌曲即可切換。支援自動播放下一首。
      </div>
    </div>
    <script>
      // 1. 先定義資料與變數
      var player;
      var currentSongIndex = 0;
      var hasStarted = false;

      const songs = [
        { title: "響念 Missing", videoId: "B5bQ355FA2o", start: 299, end: 507 },
        { title: "Moon River", videoId: "B5bQ355FA2o", start: 3338, end: 3550 },
        { title: "送給你的", videoId: "B5bQ355FA2o", start: 6938, end: 7236 },
      ];

      // 2. [重要] 先定義渲染函式，確保後面的 Ready 事件找得到它
      window.renderPlaylist = function () {
        const listElement = document.getElementById("playlist");
        if (!listElement) {
          console.error("找不到 id 為 playlist 的元素！");
          return;
        }
        listElement.innerHTML = "";
        songs.forEach((song, index) => {
          const li = document.createElement("li");
          li.className = `song-item ${index === currentSongIndex ? "active" : ""}`;
          li.innerHTML = `
                <span>${song.title}</span>
                <span class="status-tag">${index === currentSongIndex ? (hasStarted ? "播放中" : "已選取") : ""}</span>
            `;
          li.onclick = () => window.handleSongClick(index);
          listElement.appendChild(li);
        });
      };

      window.handleSongClick = function (index) {
        currentSongIndex = index;
        hasStarted = true; // 點擊即播放，標記為已啟動
        const song = songs[index];

        player.loadVideoById({
          videoId: song.videoId,
          startSeconds: song.start,
        });
        window.renderPlaylist();
      };

      // 3. YouTube API 相關事件
      window.onYouTubeIframeAPIReady = function () {
        player = new YT.Player("player", {
          height: "360",
          width: "100%",
          playerVars: {
            autoplay: 0,
            controls: 1,
            enablejsapi: 1,
            origin: window.location.origin,
          },
          events: {
            onReady: window.onPlayerReady,
            onStateChange: window.onPlayerStateChange,
          },
        });
      };

      window.onPlayerReady = function () {
        console.log("播放器就緒");
        window.renderPlaylist(); // 現在絕對找得到了
        // 初始僅預備第一首，不自播
        player.cueVideoById({
          videoId: songs[0].videoId,
          startSeconds: songs[0].start,
        });
      };

      window.onPlayerStateChange = function (event) {
        if (event.data === YT.PlayerState.PLAYING) {
          if (!hasStarted) {
            hasStarted = true;
            window.renderPlaylist();
          }
        }
        if (event.data === YT.PlayerState.ENDED && hasStarted) {
          window.playNext();
        }
      };

      window.playNext = function () {
        if (currentSongIndex < songs.length - 1) {
          currentSongIndex++;
          player.loadVideoById({
            videoId: songs[currentSongIndex].videoId,
            startSeconds: songs[currentSongIndex].start,
          });
          window.renderPlaylist();
        }
      };
    </script>

    <script src="https://www.youtube.com/iframe_api"></script>
  </body>
</html>
