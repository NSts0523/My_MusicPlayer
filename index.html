<script>
  // 1. 先宣告變數
  var player;
  var currentSongIndex = 0;
  var hasStarted = false;
  const songs = [
    { title: "響念 Missing", videoId: "B5bQ355FA2o", start: 299, end: 507 },
    { title: "Moon River", videoId: "B5bQ355FA2o", start: 3338, end: 3550 },
    { title: "送給你的", videoId: "B5bQ355FA2o", start: 6938, end: 7236 },
  ];

  // 2. 將函式直接掛載到 window，確保 API 絕對找得到
  window.onYouTubeIframeAPIReady = function () {
    console.log("API 準備中...");
    player = new YT.Player("player", {
      height: "360",
      width: "100%",
      playerVars: {
        autoplay: 0,
        controls: 1,
        enablejsapi: 1,
        origin: window.location.origin,
      },
      events: {
        onReady: window.onPlayerReady,
        onStateChange: window.onPlayerStateChange,
      },
    });
  };

  window.onPlayerReady = function () {
    console.log("播放器就緒");
    renderPlaylist();
    prepareSong(0);
  };

  // ... 前方的初始化程式碼保持不變 ...

  window.onPlayerStateChange = function (event) {
    // 當影片真正開始播放時
    if (event.data === YT.PlayerState.PLAYING) {
      hasStarted = true;
      renderPlaylist();
    }

    // 當影片結束且處於聽歌模式時，自動下一首
    if (event.data === YT.PlayerState.ENDED && hasStarted) {
      playNext();
    }
  };

  function handleSongClick(index) {
    currentSongIndex = index;
    const song = songs[index];

    // 關鍵：直接 load，不要 cue
    hasStarted = true;
    player.loadVideoById({
      videoId: song.videoId,
      startSeconds: song.start,
    });

    renderPlaylist();
  }

  function playNext() {
    if (currentSongIndex < songs.length - 1) {
      currentSongIndex++;
      const nextSong = songs[currentSongIndex];

      // 自動下一首也要直接 load
      player.loadVideoById({
        videoId: nextSong.videoId,
        startSeconds: nextSong.start,
      });
      renderPlaylist();
    } else {
      console.log("歌單已播完");
    }
  }
</script>

<script src="https://www.youtube.com/iframe_api"></script>
