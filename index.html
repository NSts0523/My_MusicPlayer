<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的音樂播放器 | 極簡低廣告版</title>
    <style>
      :root {
        --bg-color: #0f0f0f;
        --card-bg: #1e1e1e;
        --accent-color: #ff0000;
        --text-main: #ffffff;
        --text-dim: #aaaaaa;
      }
      body {
        font-family: sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }
      .container {
        width: 90%;
        max-width: 800px;
        padding: 40px 20px;
      }
      #player-wrapper {
        background: #000;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }
      .playlist {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 10px;
        list-style: none;
      }
      .song-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        margin: 5px 0;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
        border-left: 4px solid transparent;
      }
      .song-item:hover {
        background: #2a2a2a;
      }
      .song-item.active {
        background: #2a2a2a;
        border-left-color: var(--accent-color);
      }
      .status {
        font-size: 0.8em;
        color: var(--text-dim);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Music Station</h1>
      <div id="player-wrapper"><div id="player"></div></div>
      <ul class="playlist" id="playlist"></ul>
    </div>

    <script>
      const songs = [
        { title: "響念 Missing", videoId: "B5bQ355FA2o", start: 299 },
        { title: "Moon River", videoId: "B5bQ355FA2o", start: 3338 },
        { title: "送給你的", videoId: "B5bQ355FA2o", start: 6938 },
      ];

      let player;
      let currentSongIndex = 0;

      // 【關鍵優化 1】: 使用載入 YouTube API 的無 Cookie 版本
      var tag = document.createElement("script");
      tag.src = "https://www.youtube-nocookie.com/iframe_api";
      var firstScriptTag = document.getElementsByTagName("script")[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

      function onYouTubeIframeAPIReady() {
        player = new YT.Player("player", {
          height: "360",
          width: "100%",
          // 初始化不設定影片，避免一進網頁就觸發廣告
          playerVars: {
            autoplay: 0,
            controls: 1,
            rel: 0, // 【關鍵優化 2】: 隱藏相關影片
            modestbranding: 1, // 【關鍵優化 3】: 隱藏 Logo
            iv_load_policy: 3, // 【關鍵優化 4】: 隱藏註解
            enablejsapi: 1,
            origin: window.location.origin,
          },
          events: {
            onReady: onPlayerReady,
            onStateChange: onPlayerStateChange,
          },
        });
      }

      function onPlayerReady() {
        renderPlaylist();
        // 使用 cue 而非 load，能有效降低廣告加載優先權
        player.cueVideoById({
          videoId: songs[0].videoId,
          startSeconds: songs[0].start,
        });
      }

      function onPlayerStateChange(event) {
        // 自動播放下一首邏輯
        if (event.data === YT.PlayerState.ENDED) {
          playNext();
        }
        // 偵測廣告後的自動回位
        if (event.data === YT.PlayerState.PLAYING) {
          const song = songs[currentSongIndex];
          if (Math.abs(player.getCurrentTime() - song.start) > 5) {
            player.seekTo(song.start, true);
          }
        }
      }

      function playSong(index) {
        const song = songs[index];
        currentSongIndex = index;

        // 【關鍵優化 5】: 同影片強制跳轉，絕對不執行重新載入
        const currentVideoId = player.getVideoData()
          ? player.getVideoData().video_id
          : null;

        if (song.videoId === currentVideoId) {
          console.log("偵測到同影片，執行無廣告跳轉");
          player.seekTo(song.start, true);
          player.playVideo();
        } else {
          console.log("切換不同影片");
          player.loadVideoById({
            videoId: song.videoId,
            startSeconds: song.start,
          });
        }
        updateUI();
      }

      function playNext() {
        currentSongIndex++;
        if (currentSongIndex < songs.length) {
          playSong(currentSongIndex);
        }
      }

      function renderPlaylist() {
        const listElement = document.getElementById("playlist");
        listElement.innerHTML = "";
        songs.forEach((song, index) => {
          const li = document.createElement("li");
          li.className = `song-item ${index === currentSongIndex ? "active" : ""}`;
          li.innerHTML = `<div class="song-info"><span class="title">${song.title}</span><span class="status">${index === currentSongIndex ? "正在播放" : "待播放"}</span></div>`;
          li.onclick = () => playSong(index);
          listElement.appendChild(li);
        });
      }

      function updateUI() {
        const items = document.querySelectorAll(".song-item");
        items.forEach((item, index) => {
          item.className = `song-item ${index === currentSongIndex ? "active" : ""}`;
          item.querySelector(".status").innerText =
            index === currentSongIndex ? "正在播放" : "待播放";
        });
      }
    </script>
  </body>
</html>
