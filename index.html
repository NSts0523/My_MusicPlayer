<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的音樂播放器 | My Music Station</title>
    <style>
      :root {
        --bg-color: #0f0f0f;
        --card-bg: #1e1e1e;
        --accent-color: #ff0000;
        --text-main: #ffffff;
        --text-dim: #aaaaaa;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        width: 90%;
        max-width: 800px;
        padding: 40px 20px;
      }

      h1 {
        font-weight: 300;
        letter-spacing: 2px;
        margin-bottom: 30px;
      }

      /* 播放器容器：隱藏但保持運作 */
      #player-wrapper {
        background: #000;
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        /* 如果你想完全像背景音樂，可以取消註解下面這行 */
        /* display: none; */
      }

      /* 歌單樣式 */
      .playlist {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 10px;
        list-style: none;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }

      .song-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        margin: 5px 0;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        border-left: 4px solid transparent;
      }

      .song-item:hover {
        background: #2a2a2a;
        transform: translateX(5px);
      }

      .song-item.active {
        background: #2a2a2a;
        border-left-color: var(--accent-color);
      }

      .song-info .title {
        display: block;
        font-size: 1.1em;
      }
      .song-info .status {
        font-size: 0.8em;
        color: var(--text-dim);
      }

      .controls-hint {
        margin-top: 20px;
        color: var(--text-dim);
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Music Station</h1>

      <div id="player-wrapper">
        <div id="player"></div>
      </div>

      <ul class="playlist" id="playlist"></ul>

      <div class="controls-hint">
        提示：點擊歌曲即可切換。支援自動播放下一首。
      </div>
    </div>

    <script>
      // 1. 你的歌單資料
      const songs = [
        { title: "響念 Missing", videoId: "B5bQ355FA2o", start: 299, end: 507 },
        { title: "Moon River", videoId: "B5bQ355FA2o", start: 3338, end: 3550 },
        {
          title: "送給你的",
          videoId: "B5bQ355FA2o",
          start: 6938,
          end: 7236,
        },
      ];

      let player;
      let currentSongIndex = 0;

      // 2. 初始化 YouTube API
      function onYouTubeIframeAPIReady() {
        player = new YT.Player("player", {
          height: "360",
          width: "100%", // 適應手機寬度
          // videoId: songs[0].videoId,
          playerVars: {
            controls: 1, // 顯示控制列（這有助於手動跳過廣告）
            rel: 0, // 不顯示相關影片
            enablejsapi: 1,
            origin: location.origin,
          },
          events: {
            onReady: onPlayerReady,
            onStateChange: onPlayerStateChange,
            onError: onPlayerError,
          },
        });
      }

      function onPlayerReady() {
        renderPlaylist();
        prepareSong(0);
      }

      // 3. 核心功能：自動播放下一首
      function onPlayerStateChange(event) {
        const song = songs[currentSongIndex];

        // 當使用者按下播放鍵，狀態變為 PLAYING (1) 時
        if (event.data === YT.PlayerState.PLAYING) {
          const currentTime = player.getCurrentTime();

          // 檢查目前秒數是否跟目標秒數差太多（例如超過 3 秒）
          if (Math.abs(currentTime - song.start) > 3) {
            console.log("偵測到時間偏移，執行手動校準...");
            player.seekTo(song.start, true);
          }
        }

        // 自動下一首邏輯（如果你選了手動播放，這部分可以保留或移除）
        if (event.data === YT.PlayerState.ENDED) {
          // 如果你希望播完這首就停下來，這裡就不要呼叫 playNext()
          console.log("影片結束");
        }
      }
      function prepareSong(index) {
        currentSongIndex = index;
        const song = songs[index];

        // 使用 cueVideoById，這絕對不會自動播放
        player.cueVideoById({
          videoId: song.videoId,
          startSeconds: song.start,
        });

        console.log(`已預備歌曲：${song.title}，請手動點擊播放器開始。`);
        updateUI();
      }
      // 4. 播放指定歌曲
      function playSong(index) {
        const song = songs[index];
        currentSongIndex = index;

        console.log(`已選取：${song.title}，準備跳轉至：${song.start}秒`);

        // 使用 cueVideoById 替代 loadVideoById
        // 這會載入影片縮圖與進度條，但保持暫停狀態
        player.cueVideoById({
          videoId: song.videoId,
          startSeconds: song.start,
        });

        updateUI(); // 更新歌單的高亮顯示
      }
      // 5. 渲染與更新 UI
      function renderPlaylist() {
        const listElement = document.getElementById("playlist");
        songs.forEach((song, index) => {
          const li = document.createElement("li");
          li.className = "song-item";
          li.innerText = song.title;
          // 點擊後改為執行 prepareSong 而不是播放
          li.onclick = () => prepareSong(index);
          listElement.appendChild(li);
        });
      }

      function updateUI() {
        const items = document.querySelectorAll(".song-item");
        items.forEach((item, index) => {
          item.className = `song-item ${index === currentSongIndex ? "active" : ""}`;
          item.querySelector(".status").innerText =
            index === currentSongIndex ? "正在播放" : "待播放";
        });
      }

      function onPlayerError(e) {
        console.error("播放發生錯誤，代碼：" + e.data);
        if (e.data == 101 || e.data == 150) {
          alert("抱歉，此影片因版權或嵌入限制無法播放。");
        }
      }
    </script>

    <script src="https://www.youtube.com/iframe_api"></script>
  </body>
</html>
